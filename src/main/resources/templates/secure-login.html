<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login y Registro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 50px; background-color: #f4f4f9; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .vulnerable { border-top: 5px solid #f44336; }
        .seguro { border-top: 5px solid #4caf50; }
        .registro { border-top: 5px solid #2196f3; width: 100%; max-width: 650px; }
        h2 { font-size: 1.2em; margin-top: 0; }
        input { width: 90%; margin: 10px 0; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .error { color: #f44336; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card registro">
    <h2>Registro de Nuevo Usuario</h2>
    <p><small>Este formulario guardará los datos en ambos formatos simultáneamente para la práctica.</small></p>
    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Nombre de usuario nuevo" required>
        <input type="password" name="password" placeholder="Contraseña para registrar" required>
        <button type="submit" style="background: #2196f3;">Crear Usuario</button>
    </form>
</div>

<div class="card vulnerable">
    <h2>Login Vulnerable</h2>
    <p><small>Prueba SQL Injection aquí:<br><code>' OR '1'='1</code></small></p>
    <div th:if="${errorV}" class="error" th:text="${errorV}"></div>
    <form action="/login-vulnerable" method="POST">
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Password (Plano)" required>
        <button type="submit" style="background: #f44336;">Entrar (Inseguro)</button>
    </form>
</div>

<div class="card seguro">
    <h2>Login Seguro</h2>
    <p><small>Usa consultas parametrizadas y verificación de BCrypt.</small></p>
    <div th:if="${errorS}" class="error" th:text="${errorS}"></div>
    <form action="/login-seguro" method="POST">
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Password (Hash)" required>
        <button type="submit" style="background: #4caf50;">Entrar (Seguro)</button>
    </form>
</div>

</body>
</html>
