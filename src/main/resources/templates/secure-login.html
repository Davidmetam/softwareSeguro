<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio de Seguridad - Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: space-around; padding: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        .vulnerable { background-color: #ffebee; border-color: #ef9a9a; }
        .seguro { background-color: #e8f5e9; border-color: #a5d6a7; }
        h2 { font-size: 1.2em; }
        input { width: 90%; margin: 10px 0; padding: 8px; }
        button { width: 100%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card vulnerable">
    <h2>Login Vulnerable</h2>
    <p><small>SQL Injection & Texto Plano</small></p>
    <form action="/login-vulnerable" method="POST">
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" style="background: #f44336; color: white; border: none;">Entrar (Inseguro)</button>
    </form>
</div>

<div class="card seguro">
    <h2>Login Seguro</h2>
    <p><small>PreparedStatements & BCrypt</small></p>
    <form action="/login-seguro" method="POST">
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" style="background: #4caf50; color: white; border: none;">Entrar (Seguro)</button>
    </form>
</div>

</body>
</html>
